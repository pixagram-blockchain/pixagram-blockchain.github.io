                    cornflowerblue  45%,
                    mediumpurple    48%,
                    transparent     51%,
                    transparent     100%

            15%  { transform: translateY(75%);   opacity: 1;   }
            45%  { transform: translateY(25%);   opacity: 0.1; }
            60%  { transform: translateY(-75%);  opacity: 0;   }
            100% { transform: translateY(-100%); opacity: 0;   }
        }

           ====================================================================== */

        body.loaded > #app {

        body.loading {
            font-size: 0 !important;
            background-color: #000;
            min-height: 100%;

        }
