        /* ── Unconditional black floor ─────────────────────────────────────
           Every layer down to <html> paints black, so no state transition
           (loading ↔ loaded, route change, lazy-load suspense) can expose

            -ms-user-select: none;

            content-visibility: initial;

            animation-iteration-count: 1 !important;
            animation-delay: 250ms !important;
            animation-fill-mode: both !important;
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1) !important;
            animation-name: ripupblend !important;
            animation-duration: 1250ms !important;
        }
        @keyframes ripupblend {
            0% {
                mix-blend-mode: multiply;
            }
            100% {
                mix-blend-mode: initial;
            }
        }
        body.loaded::before {
            opacity: 0 !important;
            visibility: hidden !important;
            content: "";
            content-visibility: visible;
            contain: paint style size layout !important;
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 9999999;
            top: 0;
            left: 0;
            background-image: radial-gradient(transparent 0%, transparent 30%, red 33%, darkorange 36%, greenyellow 39%, aqua 42%, cornflowerblue 45%, mediumpurple 48%, transparent 51%, transparent 100%) !important;
            background-color: transparent !important;
            background-size: 400% 150% !important;
            background-position: 50% 25% !important;
            background-blend-mode: overlay;
            animation-iteration-count: 1 !important;
            animation-delay: 250ms !important;
            animation-fill-mode: both !important;
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1) !important;
            animation-name: ripup !important;
            animation-duration: 1250ms !important;
        }
        @keyframes ripup {
            0% {display: block !important; transform: translateY(175%); opacity: .5 }
            15% { display: block !important; transform: translateY(75%); opacity: 1  }
            45% { display: block !important; transform: translateY(25%); opacity: 0.1  }
            60% { display: block !important; transform: translateY(-75%); opacity: 0  }
            100% { display: none !important; transform: translateY(-100%); opacity: 0  }
        }
        body.loaded > #app {
            contain: size style layout;
            content-visibility: auto;
            position: relative;
            will-change: auto;
            overflow: hidden;
            background-color: black;
        }
        body.loading[datainitiated=true] > #app {
            contain: size style layout;
            will-change: contents;
            content-visibility: visible;
        }
        body.loading[datainitiated=false] > #app {
            contain: size style layout;
            will-change: auto;
            content-visibility: visible;
        }
        body.loading[datainitiated=false] {
            animation-fill-mode: both;
            animation-name: bounce;
            animation-duration: 1000ms;
            animation-delay: 450ms;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            overflow: auto;

        @keyframes bounce {

            animation-timing-function: ease;
            animation-iteration-count: 1;
        }
        @keyframes bounce-in {
            0% {

                filter: opacity(0);
                transform: scale(0);
            }
            50% {

        body.loading  {
            /* mix-blend-mode removed — was compositing body against html/page
